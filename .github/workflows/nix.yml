name: Nix Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore rolling release NAR cache
        continue-on-error: true
        run: |
          curl -fL --retry 3 \
            -o "$RUNNER_TEMP/initos-artifacts.nar" \
            https://github.com/costinm/initos/releases/download/rolling-release/initos-artifacts.nar
          nix-store --import < "$RUNNER_TEMP/initos-artifacts.nar"

      - name: Check rolling release cache hit
        run: |
          expected="$(nix eval --raw .#packages.x86_64-linux.initos-artifacts.outPath)"
          echo "Expected initos-artifacts path: ${expected}"
          if nix-store --verify-path "$expected" >/dev/null 2>&1; then
            echo "Rolling release cache hit: ${expected}"
          else
            echo "Rolling release cache miss; building current flake output."
          fi

      - name: Build initos artifacts
        run: nix build .#initos-artifacts -o result-artifacts

      - name: Build EFI
        run: nix build .#efi -o result-efi

      - name: Check unsigned artifact layout
        run: |
          test -d result-artifacts/boot/EFI/BOOT
          test -d result-artifacts/opt/busybox
          test -d result-artifacts/opt/initos
          test -f result-artifacts/img/initos.erofs
          if find -L result-artifacts -type f \( -name '*.sig' -o -name '*signed*.img' \) | grep -q .; then
            echo "unsigned artifact output contains signed artifacts" >&2
            find -L result-artifacts -type f \( -name '*.sig' -o -name '*signed*.img' \) >&2
            exit 1
          fi

      - name: Verify result signer
        run: |
          result-artifacts/bin/sign.sh artifacts \
            result-artifacts \
            "$RUNNER_TEMP/initos-signed" \
            "$RUNNER_TEMP/initos-sign-keys"
          test -f "$RUNNER_TEMP/initos-signed/img/initos.erofs.sig"
          test -f "$RUNNER_TEMP/initos-signed/img/boot-initos-signed.img"
          find "$RUNNER_TEMP/initos-signed/boot/EFI/BOOT" -maxdepth 1 -type f -name '*.sig' | grep -q .

      - name: Build OCI cache image
        run: nix build .#oci-cache-image -o result-oci-cache-image

      - name: Package artifacts
        run: |
          STORE_PATH=$(readlink -f result-artifacts)
          nix-store --export "$STORE_PATH" > initos-artifacts.nar
          tar -C result-artifacts -czf initos-artifacts.tar.gz .
          cp --remove-destination "$(readlink -f result-oci-cache-image)" oci-cache-image.tar.gz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: initos-nix-artifacts
          path: |
            initos-artifacts.nar
            initos-artifacts.tar.gz
            oci-cache-image.tar.gz

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-release
          name: Rolling Release
          draft: false
          prerelease: true
          make_latest: true
          files: |
            initos-artifacts.nar
            initos-artifacts.tar.gz
            oci-cache-image.tar.gz
          body: "Unsigned Nix artifacts, expanded artifact tarball, and OCI cache image."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
