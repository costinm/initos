name: Nix Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore rolling release NAR cache
        continue-on-error: true
        run: |
          curl -fL --retry 3 \
            -o "$RUNNER_TEMP/initos-signer.nar" \
            https://github.com/costinm/initos/releases/download/rolling-release/initos-signer.nar
          nix-store --import < "$RUNNER_TEMP/initos-signer.nar"

      - name: Check rolling release cache hit
        run: |
          expected="$(nix eval --raw .#packages.x86_64-linux.initos-signer.outPath)"
          echo "Expected initos-signer path: ${expected}"
          if nix-store --verify-path "$expected" >/dev/null 2>&1; then
            echo "Rolling release cache hit: ${expected}"
          else
            echo "Rolling release cache miss; building current flake output."
          fi

      - name: Build initos signer
        run: nix build .#initos-signer -o result-signer

      - name: Build OCI cache image
        run: nix build .#oci-cache-image -o result-oci-cache-image

      - name: Restore kernel rolling release NAR cache
        continue-on-error: true
        run: |
          curl -fL --retry 3 \
            -o "$RUNNER_TEMP/initos-kernel-host.nar" \
            https://github.com/costinm/initos/releases/download/rolling-release/initos-kernel-host.nar
          nix-store --import < "$RUNNER_TEMP/initos-kernel-host.nar"

      - name: Build host kernel
        run: nix build ./linux#kernel-host -o result-kernel-host

      - name: Package host kernel
        run: |
          STORE_PATH=$(readlink -f result-kernel-host)
          nix-store --export "$STORE_PATH" > initos-kernel-host.nar
          tar -C result-kernel-host -czf initos-kernel-host.tar.gz .
          ##cp --remove-destination "$(readlink -f result-docker-image)" initos-kernel-host-image.tar.gz

      - name: Build Docker Image - with current kernel
        run: nix build .#docker-image -o result-docker-image

      - name: Package artifacts
        run: |
          STORE_PATH=$(readlink -f result-signer)
          nix-store --export "$STORE_PATH" > initos-signer.nar
          tar -C result-signer -czf initos-signer.tar.gz .

          cp --remove-destination "$(readlink -f result-oci-cache-image)" oci-cache-image.tar.gz
          cp --remove-destination "$(readlink -f result-docker-image)" initos-signer-image.tar.gz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: initos-nix-artifacts
          path: |
            initos-signer.nar
            initos-signer.tar.gz
            initos-kernel-host.nar
            initos-kernel-host.tar.gz

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and Push Docker/OCI images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Load and push initos-signer
          docker load -i initos-signer-image.tar.gz
          docker tag initos-signer:latest ghcr.io/${owner_lc}/initos-signer:latest
          docker push ghcr.io/${owner_lc}/initos-signer:latest

          # Load and push nix-artifact-cache (oci-cache-image)
          docker load -i oci-cache-image.tar.gz
          loaded_cache=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep nix-artifact-cache | head -n 1)
          if [ -n "$loaded_cache" ]; then
            docker tag "$loaded_cache" ghcr.io/${owner_lc}/initos-artifacts-cache:latest
            docker push ghcr.io/${owner_lc}/initos-artifacts-cache:latest
          fi

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-release
          name: Rolling Release
          draft: false
          prerelease: true
          make_latest: true
          files: |
            initos-signer.nar
            initos-signer.tar.gz
            initos-kernel-host.nar
            initos-kernel-host.tar.gz
            initos-signer-image.tar.gz
            oci-cache-image.tar.gz
          body: "Rolling Release containing initos-signer NAR, tarball, and container images."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
