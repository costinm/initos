name: Cloud Kernel
on:
  push:
    branches: [ main ]
    paths:
      - linux/**
      - .github/workflows/kernel-host.yml
  workflow_dispatch:

jobs:
  kernel-host:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build host kernel
        run: nix build ./linux#kernel-host -o result-kernel-host

      - name: Build Docker Image
        run: nix build ./linux#docker-image -o result-docker-image

      - name: Package host kernel
        run: |
          STORE_PATH=$(readlink -f result-kernel-host)
          nix-store --export "$STORE_PATH" > initos-kernel-host.nar
          tar -C result-kernel-host -czf initos-kernel-host.tar.gz .
          cp --remove-destination "$(readlink -f result-docker-image)" initos-kernel-host-image.tar.gz

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: initos-kernel-host
          path: |
            initos-kernel-host.nar
            initos-kernel-host.tar.gz
            initos-kernel-host-image.tar.gz

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and Push Docker image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker load -i initos-kernel-host-image.tar.gz
          docker tag initos-kernel-host:latest ghcr.io/${owner_lc}/initos-kernel-host:latest
          docker push ghcr.io/${owner_lc}/initos-kernel-host:latest

      - name: Create or Update Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling-release
          name: Rolling Release
          draft: false
          prerelease: true
          make_latest: true
          files: |
            initos-kernel-host.nar
            initos-kernel-host.tar.gz
            initos-kernel-host-image.tar.gz
          body: "Rolling Release kernel-host build."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
