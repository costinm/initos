timeout: 2
serial: yes
graphics: no
verbose: yes
editor_enabled: yes

# EFI boot dir using limine boot loader
# Mainly for testing/experiments - use the minimal efi for
# secure boot, simpler and safer than limine process.

# nomodeset console=efifb earlyprintk=efi 

/Boot
  protocol: linux
  cmdline: console=ttyS0,115200 console=tty1 net.ifnames=0 panic=5 loglevel=6   
  path: boot():/EFI/BOOT/bzImage
  module_path: boot():/EFI/BOOT/initrd.img

/Boot-ROOTA
  protocol: linux
  path: boot():/EFI/BOOT/bzImage
  cmdline: root=PARTLABEL=STATE console=tty1 imomem=relaxed net.ifnames=0 panic=5 loglevel=6 

/Boot-ROOTA-sh
  protocol: linux
  path: boot():/EFI/BOOT/bzImage
  cmdline: root=PARTLABEL=ROOT-A init=/bin/sh console=tty1 imomem=relaxed net.ifnames=0 panic=5 loglevel=6 

/Boot-Sidecar
  protocol: linux
  path: boot():/EFI/BOOT/bzImage
  cmdline: root=PARTLABEL=ROOT-B console=tty1 imomem=relaxed net.ifnames=0 panic=5 loglevel=6 

/Boot-Sidecar-sh
  protocol: linux
  path: boot():/EFI/BOOT/bzImage
  cmdline: root=PARTLABEL=ROOT-B init=/bin/sh console=tty1 imomem=relaxed net.ifnames=0 panic=5 loglevel=6 


/Boot-USB-sh
  protocol: linux
  path: boot():/EFI/BOOT/bzImage
  cmdline: root=PARTLABEL=DATA-U init=/bin/sh console=tty1 imomem=relaxed net.ifnames=0 panic=5 loglevel=6 
